name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure D-Bus test tools
        run: sudo apt-get update && sudo apt-get install -y dbus
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-targets
      - run: dbus-run-session -- cargo test -p vinput-daemon --features dbus-integration --test dbus_integration
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p vinput-daemon --all-targets --features dbus-integration -- -D warnings
