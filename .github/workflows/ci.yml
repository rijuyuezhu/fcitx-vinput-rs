name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure native test tools
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y dbus libpipewire-0.3-dev libspa-0.2-dev libclang-dev clang pkg-config cmake g++ clang-format clang-tidy libsystemd-dev
      - name: Ensure just
        run: |
          if ! command -v just >/dev/null 2>&1; then
            cargo install just --locked
          fi
      - name: Run CI checks
        run: just ci
      - name: Run optional PipeWire checks
        run: just pipewire-check
