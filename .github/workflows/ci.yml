name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure native test tools
        run: sudo apt-get update && sudo apt-get install -y dbus libpipewire-0.3-dev libspa-0.2-dev libclang-dev clang pkg-config
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-targets
      - run: dbus-run-session -- cargo test -p vinput-daemon --features dbus-integration --test dbus_integration
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p vinput-daemon --all-targets --features dbus-integration -- -D warnings
      - run: cargo test -p vinput-daemon --features=pipewire-backend
      - run: cargo clippy -p vinput-daemon --all-targets --features=pipewire-backend -- -D warnings
      - run: cargo test -p vinput-audio --features=pipewire-backend
      - run: cargo clippy -p vinput-audio --all-targets --features=pipewire-backend -- -D warnings
      - run: cargo test -p vinput-cli --features=pipewire-backend --test audio_devices
      - run: cargo clippy -p vinput-cli --all-targets --features=pipewire-backend -- -D warnings
