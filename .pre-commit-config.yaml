repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        types_or: [rust]
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        types_or: [rust]
      - id: cpp-addon-format
        name: C++ addon bridge format
        entry: just addon-format-check
        language: system
        pass_filenames: false
        files: ^cpp/fcitx5-addon/.*\.(cpp|h)$
      - id: cpp-addon-lint
        name: C++ addon bridge lint
        entry: just addon-lint
        language: system
        pass_filenames: false
        files: ^(cpp/fcitx5-addon/.*\.(cpp|h)|cpp/fcitx5-addon/CMakeLists\.txt|\.clang-tidy|justfile)$
